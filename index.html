<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="ガソリン 満タン 価格 計算, 給油 費用 計算, ガソリン代 計算, 車 タンク 容量, ガソリン代 いくら, プリウス 満タン, ガソリン価格 計算機">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="ガソリン満タン価格計算 | 車種・単価を入れるだけ">
  <meta property="og:description" content="50車種以上に対応。ガソリン単価と車種を入力するだけで満タン時の合計金額を計算。レギュラー・ハイオク・軽油対応。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <link rel="canonical" href="https://caroilprice.pages.dev/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "ガソリン満タン価格計算",
    "description": "車種とガソリン単価を入力するだけで、満タンにしたときの合計給油費用を計算できるWebツールです。プリウス・アクアなど50車種以上に対応。レギュラー・ハイオク・軽油に対応。",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "All",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "JPY"
    }
  }
  </script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #e65c00, #f9d423);
      color: white;
      padding: 24px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header p {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    main {
      max-width: 480px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .search-wrap {
      position: relative;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 16px; /* iOS自動ズーム防止 */
      outline: none;
      transition: border-color 0.2s;
      background: #fafafa;
    }

    input:focus {
      border-color: #e65c00;
      background: white;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: white;
      border: 2px solid #e65c00;
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .suggestions li {
      list-style: none;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.1s;
    }

    .suggestions li:hover,
    .suggestions li.active {
      background: #fff3e8;
    }

    .suggestions li span {
      font-size: 0.78rem;
      color: #aaa;
      margin-left: 8px;
    }

    .tank-hint {
      margin-top: 6px;
      font-size: 0.8rem;
      color: #e65c00;
      font-weight: 600;
      min-height: 18px;
    }

    .fuel-group {
      display: flex;
      gap: 8px;
    }

    .fuel-btn {
      flex: 1;
      padding: 12px 4px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      background: #fafafa;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
      font-weight: 500;
      min-height: 44px; /* タッチターゲット確保 */
    }

    .fuel-btn.selected {
      border-color: #e65c00;
      background: #fff3e8;
      color: #e65c00;
      font-weight: 700;
    }

    .level-group {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .level-btn {
      padding: 10px 4px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      background: #fafafa;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
      font-weight: 500;
      text-align: center;
      min-height: 44px; /* タッチターゲット確保 */
    }

    .level-btn.selected {
      border-color: #e65c00;
      background: #fff3e8;
      color: #e65c00;
      font-weight: 700;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .price-row input {
      flex: 1;
    }

    .price-row .unit {
      font-size: 0.9rem;
      color: #888;
      white-space: nowrap;
    }

    .calc-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #e65c00, #f9a825);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: 0.05em;
      transition: opacity 0.2s, transform 0.1s;
    }

    .calc-btn:hover {
      opacity: 0.92;
    }

    .calc-btn:active {
      transform: scale(0.98);
    }

    .result-card {
      background: linear-gradient(135deg, #e65c00, #f9a825);
      border-radius: 16px;
      padding: 28px 24px;
      color: white;
      text-align: center;
      margin-top: 20px;
      box-shadow: 0 4px 20px rgba(230,92,0,0.3);
      display: none;
    }

    .result-card.show {
      display: block;
    }

    .result-label {
      font-size: 0.85rem;
      opacity: 0.85;
      letter-spacing: 0.08em;
    }

    .result-amount {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 8px 0 4px;
    }

    .result-detail {
      font-size: 0.82rem;
      opacity: 0.85;
      margin-top: 10px;
      line-height: 1.7;
    }

    .error-msg {
      color: #d32f2f;
      font-size: 0.82rem;
      margin-top: 8px;
      display: none;
    }

    .ad-area {
      margin-top: 20px;
      text-align: center;
    }

    .ad-label {
      font-size: 0.68rem;
      color: #bbb;
      margin-bottom: 6px;
    }

    footer {
      text-align: center;
      font-size: 0.72rem;
      color: #bbb;
      padding: 16px 16px 24px;
    }
  </style>
</head>
<body>

<header>
  <h1>⛽ 満タン価格計算</h1>
  <p>車種と単価を入れるだけで、給油費用がわかります</p>
</header>

<main>
  <div class="card">

    <!-- 車種 -->
    <div class="field">
      <label>車種</label>
      <div class="search-wrap">
        <input type="text" id="carInput" placeholder="例：プリウス" autocomplete="off">
        <ul class="suggestions" id="suggestions" style="display:none;"></ul>
      </div>
      <div class="tank-hint" id="tankHint"></div>
    </div>

    <!-- 燃料種別 -->
    <div class="field">
      <label>燃料種別</label>
      <div class="fuel-group">
        <button class="fuel-btn selected" data-fuel="regular">レギュラー</button>
        <button class="fuel-btn" data-fuel="premium">ハイオク</button>
        <button class="fuel-btn" data-fuel="diesel">軽油</button>
      </div>
    </div>

    <!-- 単価 -->
    <div class="field">
      <label>現在の単価</label>
      <div class="price-row">
        <input type="number" id="priceInput" placeholder="175" min="1" max="999">
        <span class="unit">円 / L</span>
      </div>
    </div>

    <!-- 残量 -->
    <div class="field">
      <label>現在の残量（任意）</label>
      <div class="level-group">
        <button class="level-btn selected" data-level="0">ほぼ空</button>
        <button class="level-btn" data-level="0.25">1/4</button>
        <button class="level-btn" data-level="0.5">1/2</button>
        <button class="level-btn" data-level="0.75">3/4</button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="calc-btn" id="calcBtn">計算する</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">合計金額（目安）</div>
    <div class="result-amount" id="resultAmount"></div>
    <div class="result-detail" id="resultDetail"></div>
  </div>

  <div class="ad-area">
    <div class="ad-label">広告</div>
    <a href="https://px.a8.net/svt/ejp?a8mat=4AZNCJ+DXB04Y+1WP2+6F9M9" rel="nofollow">
      <img border="0" width="165" height="120" alt="" src="https://www25.a8.net/svt/bgt?aid=260324083842&wid=001&eno=01&mid=s00000008903001079000&mc=1">
    </a>
    <img border="0" width="1" height="1" src="https://www10.a8.net/0.gif?a8mat=4AZNCJ+DXB04Y+1WP2+6F9M9" alt="">
  </div>
</main>

<footer>
  ※ タンク容量・計算結果は参考値です。実際の給油量・金額とは異なる場合があります。
</footer>

<script>
  const CARS = [
    // トヨタ
    { name: "プリウス（60系）",   maker: "トヨタ",  tank: 43, fuel: ["regular"] },
    { name: "プリウス（50系）",   maker: "トヨタ",  tank: 43, fuel: ["regular"] },
    { name: "アクア",             maker: "トヨタ",  tank: 36, fuel: ["regular"] },
    { name: "ヤリス",             maker: "トヨタ",  tank: 36, fuel: ["regular"] },
    { name: "ヤリスクロス",       maker: "トヨタ",  tank: 36, fuel: ["regular"] },
    { name: "カローラ",           maker: "トヨタ",  tank: 50, fuel: ["regular"] },
    { name: "カローラクロス",     maker: "トヨタ",  tank: 50, fuel: ["regular"] },
    { name: "ノア",               maker: "トヨタ",  tank: 55, fuel: ["regular"] },
    { name: "ヴォクシー",         maker: "トヨタ",  tank: 55, fuel: ["regular"] },
    { name: "シエンタ",           maker: "トヨタ",  tank: 40, fuel: ["regular"] },
    { name: "ライズ",             maker: "トヨタ",  tank: 36, fuel: ["regular"] },
    { name: "ハリアー",           maker: "トヨタ",  tank: 55, fuel: ["regular"] },
    { name: "RAV4",               maker: "トヨタ",  tank: 55, fuel: ["regular"] },
    { name: "アルファード",       maker: "トヨタ",  tank: 72, fuel: ["regular"] },
    { name: "ヴェルファイア",     maker: "トヨタ",  tank: 72, fuel: ["regular"] },
    { name: "ランドクルーザー250",maker: "トヨタ",  tank: 72, fuel: ["diesel"] },
    { name: "ランドクルーザー300",maker: "トヨタ",  tank: 93, fuel: ["diesel"] },
    { name: "ハイラックス",       maker: "トヨタ",  tank: 80, fuel: ["diesel"] },
    { name: "GRヤリス",           maker: "トヨタ",  tank: 40, fuel: ["premium"] },
    { name: "GR86",               maker: "トヨタ",  tank: 50, fuel: ["premium"] },
    // ホンダ
    { name: "フィット",           maker: "ホンダ",  tank: 40, fuel: ["regular"] },
    { name: "ヴェゼル",           maker: "ホンダ",  tank: 40, fuel: ["regular"] },
    { name: "フリード",           maker: "ホンダ",  tank: 40, fuel: ["regular"] },
    { name: "ステップワゴン",     maker: "ホンダ",  tank: 52, fuel: ["regular"] },
    { name: "ZR-V",               maker: "ホンダ",  tank: 48, fuel: ["regular"] },
    { name: "シビック",           maker: "ホンダ",  tank: 46, fuel: ["premium"] },
    { name: "CR-V",               maker: "ホンダ",  tank: 57, fuel: ["regular"] },
    // 日産
    { name: "ノート",             maker: "日産",    tank: 41, fuel: ["regular"] },
    { name: "ノートオーラ",       maker: "日産",    tank: 36, fuel: ["regular"] },
    { name: "セレナ",             maker: "日産",    tank: 52, fuel: ["regular"] },
    { name: "エクストレイル",     maker: "日産",    tank: 55, fuel: ["regular"] },
    { name: "キックス",           maker: "日産",    tank: 41, fuel: ["regular"] },
    { name: "フェアレディZ",      maker: "日産",    tank: 70, fuel: ["premium"] },
    // スズキ
    { name: "スイフト",           maker: "スズキ",  tank: 37, fuel: ["regular"] },
    { name: "スイフトスポーツ",   maker: "スズキ",  tank: 37, fuel: ["premium"] },
    { name: "ハスラー",           maker: "スズキ",  tank: 32, fuel: ["regular"] },
    { name: "ジムニー",           maker: "スズキ",  tank: 40, fuel: ["regular"] },
    { name: "ジムニーシエラ",     maker: "スズキ",  tank: 40, fuel: ["regular"] },
    { name: "ソリオ",             maker: "スズキ",  tank: 32, fuel: ["regular"] },
    { name: "スペーシア",         maker: "スズキ",  tank: 27, fuel: ["regular"] },
    // ダイハツ
    { name: "タント",             maker: "ダイハツ",tank: 30, fuel: ["regular"] },
    { name: "タフト",             maker: "ダイハツ",tank: 30, fuel: ["regular"] },
    { name: "ロッキー",           maker: "ダイハツ",tank: 36, fuel: ["regular"] },
    { name: "ムーヴ",             maker: "ダイハツ",tank: 27, fuel: ["regular"] },
    // 三菱
    { name: "デリカD:5",          maker: "三菱",    tank: 60, fuel: ["diesel"] },
    { name: "アウトランダー",     maker: "三菱",    tank: 60, fuel: ["regular"] },
    { name: "エクリプスクロス",   maker: "三菱",    tank: 47, fuel: ["regular"] },
    // マツダ
    { name: "CX-5",               maker: "マツダ",  tank: 56, fuel: ["regular", "diesel"] },
    { name: "CX-60",              maker: "マツダ",  tank: 66, fuel: ["regular", "diesel"] },
    { name: "マツダ3",            maker: "マツダ",  tank: 51, fuel: ["regular"] },
    { name: "ロードスター",       maker: "マツダ",  tank: 45, fuel: ["regular"] },
    // スバル
    { name: "フォレスター",       maker: "スバル",  tank: 63, fuel: ["regular"] },
    { name: "レヴォーグ",         maker: "スバル",  tank: 60, fuel: ["premium"] },
    { name: "WRX S4",             maker: "スバル",  tank: 60, fuel: ["premium"] },
    { name: "インプレッサ",       maker: "スバル",  tank: 48, fuel: ["regular"] },
    { name: "クロストレック",     maker: "スバル",  tank: 48, fuel: ["regular"] },
  ];

  const FUEL_LABELS = {
    regular: "レギュラー",
    premium: "ハイオク",
    diesel: "軽油"
  };

  let selectedCar = null;
  let selectedFuel = "regular";
  let selectedLevel = 0;

  // --- 車種サジェスト ---
  const carInput = document.getElementById("carInput");
  const suggestionList = document.getElementById("suggestions");
  const tankHint = document.getElementById("tankHint");

  carInput.addEventListener("input", () => {
    const q = carInput.value.trim();
    if (!q) {
      suggestionList.style.display = "none";
      selectedCar = null;
      tankHint.textContent = "";
      return;
    }
    const filtered = CARS.filter(c =>
      c.name.includes(q) || c.maker.includes(q)
    ).slice(0, 8);

    if (filtered.length === 0) {
      suggestionList.style.display = "none";
      return;
    }
    suggestionList.innerHTML = filtered.map(c =>
      `<li data-name="${c.name}"><strong>${c.name}</strong><span>${c.maker} / タンク ${c.tank}L</span></li>`
    ).join("");
    suggestionList.style.display = "block";
  });

  suggestionList.addEventListener("click", e => {
    const li = e.target.closest("li");
    if (!li) return;
    const name = li.dataset.name;
    selectedCar = CARS.find(c => c.name === name);
    carInput.value = selectedCar.name;
    tankHint.textContent = `タンク容量：${selectedCar.tank}L`;
    suggestionList.style.display = "none";

    // 燃料を自動選択
    if (selectedCar.fuel.length === 1) {
      setFuel(selectedCar.fuel[0]);
    }
  });

  document.addEventListener("click", e => {
    if (!e.target.closest(".search-wrap")) {
      suggestionList.style.display = "none";
    }
  });

  // --- 燃料ボタン ---
  document.querySelectorAll(".fuel-btn").forEach(btn => {
    btn.addEventListener("click", () => setFuel(btn.dataset.fuel));
  });

  function setFuel(fuel) {
    selectedFuel = fuel;
    document.querySelectorAll(".fuel-btn").forEach(b =>
      b.classList.toggle("selected", b.dataset.fuel === fuel)
    );
  }

  // --- 残量ボタン ---
  document.querySelectorAll(".level-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedLevel = parseFloat(btn.dataset.level);
      document.querySelectorAll(".level-btn").forEach(b =>
        b.classList.toggle("selected", b === btn)
      );
    });
  });

  // --- 計算 ---
  document.getElementById("calcBtn").addEventListener("click", calculate);

  function calculate() {
    const errorMsg = document.getElementById("errorMsg");
    const resultCard = document.getElementById("resultCard");
    errorMsg.style.display = "none";

    if (!selectedCar) {
      errorMsg.textContent = "車種を選択してください。";
      errorMsg.style.display = "block";
      return;
    }
    const price = parseFloat(document.getElementById("priceInput").value);
    if (!price || price <= 0) {
      errorMsg.textContent = "ガソリン単価を入力してください。";
      errorMsg.style.display = "block";
      return;
    }

    const liters = Math.round(selectedCar.tank * (1 - selectedLevel) * 10) / 10;

    const total = Math.round(liters * price);

    document.getElementById("resultAmount").textContent =
      "¥" + total.toLocaleString();

    const levelLabel = {
      0.75: "3/4残 → 満",
      0.5: "1/2残 → 満",
      0.25: "1/4残 → 満",
      0: "ほぼ空 → 満"
    }[selectedLevel] || "";

    document.getElementById("resultDetail").innerHTML =
      `${selectedCar.name}（${FUEL_LABELS[selectedFuel]}）<br>` +
      `補給量：約 ${liters}L &nbsp;×&nbsp; ${price}円<br>` +
      `${levelLabel}`;

    resultCard.classList.add("show");
    resultCard.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
</script>
</body>
</html>
